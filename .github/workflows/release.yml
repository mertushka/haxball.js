name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: haxball-room-token
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify tag
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $VERSION" >&2
            exit 1
          fi

      - name: Verify package
        run: |
          npm run lint
          npm run type-check
          npm run build
          node -e "const pkg = require('./dist/index.cjs'); if (typeof pkg.default !== 'function') throw new Error('Invalid CommonJS entrypoint')"
          node --input-type=module -e "import HaxballJS from './dist/index.mjs'; if (typeof HaxballJS !== 'function') throw new Error('Invalid ESM entrypoint')"

      - name: Run tests
        shell: bash
        env:
          TEST_HB_HEADLESS_TOKEN: ${{ secrets.HEADLESS_TEST_TOKEN }}
        run: |
          if [[ -z "$TEST_HB_HEADLESS_TOKEN" ]]; then
            echo "HEADLESS_TEST_TOKEN is not configured" >&2
            exit 1
          fi
          npm test

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_FILE="haxball.js-$VERSION.tgz"
          npm pack
          if [[ "$(npm view "haxball.js@$VERSION" version 2>/dev/null)" != "$VERSION" ]]; then
            npm publish "./$PACKAGE_FILE" --access public --provenance
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "./$PACKAGE_FILE" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "./$PACKAGE_FILE" --generate-notes --verify-tag
          fi
