name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: haxball-room-token
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.package.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Validate package entrypoints
        run: |
          node -e "const pkg = require('./dist/index.cjs'); if (typeof pkg.default !== 'function') throw new Error('Invalid CommonJS entrypoint')"
          node --input-type=module -e "import HaxballJS from './dist/index.mjs'; if (typeof HaxballJS !== 'function') throw new Error('Invalid ESM entrypoint')"

      - name: Pack release
        id: package
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          mkdir -p package
          npm pack --pack-destination package

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: release-package
          path: package/*.tgz
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require room token
        run: node -e "if (!process.env.TEST_HB_HEADLESS_TOKEN) throw new Error('HEADLESS_TEST_TOKEN is not configured')"
        env:
          TEST_HB_HEADLESS_TOKEN: ${{ secrets.HEADLESS_TEST_TOKEN }}

      - name: Run tests
        run: npm test
        env:
          TEST_HB_HEADLESS_TOKEN: ${{ secrets.HEADLESS_TEST_TOKEN }}
          TEST_HB_PROXY: ${{ secrets.HEADLESS_TEST_PROXY }}

  publish:
    name: Publish Release
    needs: [verify, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download release package
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: package

      - name: Publish to npm
        shell: bash
        env:
          PACKAGE_VERSION: ${{ needs.verify.outputs.version }}
        run: |
          if npm view "haxball.js@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "haxball.js@$PACKAGE_VERSION is already published"
          else
            npm publish package/*.tgz --access public --provenance
          fi

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" package/*.tgz --clobber
          else
            gh release create "$GITHUB_REF_NAME" package/*.tgz --generate-notes --verify-tag
          fi
