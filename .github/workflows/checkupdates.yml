name: Haxball Headless Update

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-haxball-headless
  cancel-in-progress: false

jobs:
  update:
    name: Update Headless Source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update generated source
        id: update
        run: npm run update:headless

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.UPDATE_PR_TOKEN || github.token }}
          branch: update-haxball-headless
          delete-branch: true
          commit-message: 'chore: update haxball headless'
          title: 'Update Haxball Headless (${{ steps.update.outputs.new_hash }})'
          body: |
            Updates the generated Haxball headless source.

            Build hash: `${{ steps.update.outputs.new_hash }}`
          labels: |
            automated
            haxball-update
